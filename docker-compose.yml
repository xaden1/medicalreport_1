version: '3.9'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medproof-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      STELLAR_NETWORK: testnet
      ENABLE_BLOCKCHAIN_VERIFICATION: "true"
      ENABLE_IPFS_STORAGE: "false"
      ENABLE_AI_ANALYSIS: "false"
      ENABLE_RATE_LIMITING: "true"
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - medproof-network
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/.env:/app/.env:ro
    depends_on:
      - redis

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medproof-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      REACT_APP_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - medproof-network
    depends_on:
      - backend

  # Redis Cache (optional, for future use)
  redis:
    image: redis:7-alpine
    container_name: medproof-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - medproof-network
    volumes:
      - redis-data:/data

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: medproof-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - medproof-network
    depends_on:
      - frontend
      - backend

networks:
  medproof-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
